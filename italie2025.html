<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Itálie 2025 - tybl.eu</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #34495e;
            --accent-color: #3498db;
            --text-color: #333;
            --light-bg: #f5f6fa;
            --spacing: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background: var(--light-bg);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 var(--spacing);
        }

        header {
            background: var(--primary-color);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            color: white;
            text-decoration: none;
            font-size: 1.5rem;
            font-weight: bold;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 1.1rem;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--accent-color);
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.5rem;
        }

        main {
            padding: 2rem 0;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: var(--spacing);
            padding: var(--spacing) 0;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.3s;
            aspect-ratio: 4/3;
        }

        .gallery-item:hover {
            transform: translateY(-5px);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .gallery-item:hover img {
            transform: scale(1.05);
        }

        .gallery-item .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 0.5rem;
            transform: translateY(100%);
            transition: transform 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .gallery-item:hover .overlay {
            transform: translateY(0);
        }

        .gallery-item .caption {
            font-size: 0.9rem;
        }

        .gallery-item .download-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .gallery-item .download-btn:hover {
            background: #2980b9;
        }

        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            padding: 2rem;
        }

        .lightbox.active {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .lightbox-content {
            max-width: 90%;
            max-height: 90vh;
            position: relative;
        }

        .lightbox-content img {
            max-width: 100%;
            max-height: 90vh;
            object-fit: contain;
        }

        .lightbox-close {
            position: absolute;
            top: -40px;
            right: 0;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0.5rem;
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 1rem;
        }

        .lightbox-nav button {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            padding: 1rem;
            border-radius: 50%;
            transition: background 0.3s;
        }

        .lightbox-nav button:hover {
            background: rgba(255,255,255,0.3);
        }

        @media (max-width: 768px) {
            .mobile-menu-btn {
                display: block;
            }

            .nav-links {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: var(--primary-color);
                flex-direction: column;
                padding: 1rem;
                gap: 1rem;
            }

            .nav-links.active {
                display: flex;
            }

            .nav-links a {
                display: block;
                padding: 0.8rem;
                font-size: 1.2rem;
                text-align: center;
                background: var(--secondary-color);
                border-radius: 8px;
            }

            .gallery {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .lightbox {
                padding: 1rem;
            }

            .lightbox-nav button {
                font-size: 1.5rem;
                padding: 0.8rem;
            }

            .gallery-item .overlay {
                transform: translateY(0);
                padding: 0.8rem;
            }

            .gallery-item .download-btn {
                padding: 0.8rem 1.2rem;
                font-size: 1rem;
            }

            .gallery-item .caption {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav class="container">
            <a href="/" class="logo">tybl.eu</a>
            <button class="mobile-menu-btn" aria-label="Menu">☰</button>
            <div class="nav-links">
                <a href="/s&f">s&f</a>
                <a href="/videa">videa</a>
                <a href="/fotky">fotky</a>
            </div>
        </nav>
    </header>

    <main class="container">
        <div class="gallery">
            <!-- Gallery items will be added here -->
        </div>
    </main>

    <div class="lightbox">
        <div class="lightbox-content">
            <button class="lightbox-close" aria-label="Close">×</button>
            <img src="" alt="">
            <div class="lightbox-nav">
                <button class="lightbox-prev" aria-label="Previous">❮</button>
                <button class="lightbox-next" aria-label="Next">❯</button>
            </div>
        </div>
    </div>

    <script>
        // Mobile menu functionality
        const mobileMenuBtn = document.querySelector('.mobile-menu-btn');
        const navLinks = document.querySelector('.nav-links');

        mobileMenuBtn.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });

        // Close mobile menu when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('nav')) {
                navLinks.classList.remove('active');
            }
        });

        // Gallery and lightbox functionality
        const gallery = document.querySelector('.gallery');
        const lightbox = document.querySelector('.lightbox');
        const lightboxImg = lightbox.querySelector('img');
        const closeBtn = lightbox.querySelector('.lightbox-close');
        const prevBtn = lightbox.querySelector('.lightbox-prev');
        const nextBtn = lightbox.querySelector('.lightbox-next');
        let currentImageIndex = 0;
        let images = [];

        // Function to create gallery items
        function createGalleryItem(src, alt) {
            const item = document.createElement('div');
            item.className = 'gallery-item';
            
            const img = document.createElement('img');
            img.src = src;
            img.alt = alt;
            img.loading = 'lazy';
            
            const overlay = document.createElement('div');
            overlay.className = 'overlay';
            
            const caption = document.createElement('div');
            caption.className = 'caption';
            caption.textContent = alt;
            
            const downloadBtn = document.createElement('a');
            downloadBtn.className = 'download-btn';
            downloadBtn.textContent = 'Stáhnout';
            downloadBtn.href = src;
            downloadBtn.download = alt.replace(/[^a-z0-9]/gi, '_').toLowerCase() + '.jpg';
            downloadBtn.target = '_blank';
            
            overlay.appendChild(caption);
            overlay.appendChild(downloadBtn);
            
            item.appendChild(img);
            item.appendChild(overlay);
            
            item.addEventListener('click', (e) => {
                if (!e.target.closest('.download-btn')) {
                    currentImageIndex = images.indexOf(src);
                    updateLightbox();
                }
            });
            
            return item;
        }

        // Function to update lightbox
        function updateLightbox() {
            lightboxImg.src = images[currentImageIndex];
            lightboxImg.alt = `Image ${currentImageIndex + 1}`;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // Close lightbox
        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        }

        // Navigation in lightbox
        function showPrevImage() {
            currentImageIndex = (currentImageIndex - 1 + images.length) % images.length;
            updateLightbox();
        }

        function showNextImage() {
            currentImageIndex = (currentImageIndex + 1) % images.length;
            updateLightbox();
        }

        // Event listeners
        closeBtn.addEventListener('click', closeLightbox);
        prevBtn.addEventListener('click', showPrevImage);
        nextBtn.addEventListener('click', showNextImage);

        // Close lightbox with Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeLightbox();
            } else if (e.key === 'ArrowLeft') {
                showPrevImage();
            } else if (e.key === 'ArrowRight') {
                showNextImage();
            }
        });

        // Close lightbox when clicking outside the image
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) {
                closeLightbox();
            }
        });

        // Add images to gallery
        const imageFiles = [
            // Your image files will be added here
        ];

        imageFiles.forEach((file, index) => {
            const src = `images/italie/${file}`;
            const alt = `Itálie 2025 - ${index + 1}`;
            images.push(src);
            gallery.appendChild(createGalleryItem(src, alt));
        });
    </script>
</body>
</html>
