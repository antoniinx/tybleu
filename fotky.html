<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Fotky - tybl.eu</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="icon" href="/images/icon.svg">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/css/lightbox.min.css">
</head>
<body>
  <nav class="main-nav">
    <div class="nav-container">
      <a href="/" class="logo">tybl.eu</a>
      <div class="nav-links">
        <a href="/videa">videa</a>
        <a href="/fotky">fotky</a>
      </div>
    </div>
  </nav>

  <main class="content">
    <h1 class="page-title">Fotky</h1>
    <div class="gallery-section">
      <h2>Silvestr 2024</h2>
      <form id="passwordForm" class="password-form">
        <input type="password" id="password" placeholder="Heslo" required>
        <button type="submit">Odemknout</button>
      </form>
      <div id="error" class="error-message"></div>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/js/lightbox.min.js"></script>
  <script>
    document.getElementById('passwordForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const password = document.getElementById('password').value;
      if (password === 'sedlcany1') {
        window.location.href = '/silvestr';
      } else {
        document.getElementById('error').textContent = 'Nesprávné heslo';
      }
    });
  </script>
</body>
</html>
