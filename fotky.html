<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>fotky tybl.eu</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="icon" href="/images/icon.svg">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/css/lightbox.min.css">
</head>
<body>
  <nav class="main-nav">
    <div class="nav-container">
      <a href="/" class="logo">tybl.eu</a>
      <div class="nav-links">
        <a href="/shakes.html">s&f</a>
        <a href="/videa">videa</a>
        <a href="/fotky">fotky</a>
      </div>
    </div>
  </nav>

  <main class="content">
    <h1 class="page-title">Fotky</h1>
    <div class="gallery-section">
      <div class="silvestr-password-area">
        <span class="silvestr-label">Silvestr 2024:</span>
        <input type="password" id="silvestr-password" placeholder="Zadejte heslo">
        <button onclick="checkSilvestrPassword()">Zobrazit</button>
      </div>
      <div id="silvestr-error-message" class="error-message"></div>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/js/lightbox.min.js"></script>
  <script>
    function checkSilvestrPassword() {
      const password = document.getElementById('silvestr-password').value;
      const errorMessage = document.getElementById('silvestr-error-message');

      if (password === 'podlesikem') {
        window.location.href = '/silvestr2024.html'; // Redirect to the new page
      } else {
        errorMessage.textContent = 'Nesprávné heslo!';
        errorMessage.style.display = 'block';
      }
    }
  </script>
</body>
</html>
