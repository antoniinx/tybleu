<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tybl.eu - Contact</title>
    <link rel="icon" type="image/svg+xml" href="images/icon.svg">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="noise"></div>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="nav-logo">tybl.eu</a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="contact.html" class="active">Contact</a>
            </div>
        </div>
    </nav>
    <div class="container">
        <h1 class="glitch" data-text="Contact Us">Contact Us</h1>
        <div class="contact-content">
            <div class="contact-info">
                <h2>Get in Touch</h2>
                <p>We'd love to hear from you. Whether you have a question about our services, pricing, or anything else, our team is ready to answer all your questions.</p>
                <div class="contact-details">
                    <div class="contact-item">
                        <h3>Email</h3>
                        <p>contact@tybl.eu</p>
                    </div>
                    <div class="contact-item">
                        <h3>Location</h3>
                        <p>Czech Republic</p>
                    </div>
                </div>
            </div>
            <form class="contact-form">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
